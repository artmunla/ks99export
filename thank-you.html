<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | KS 99 EXPORT</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #eef5f1;
      color: #123524;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 900px;
      border-radius: 24px;
      padding: 56px 32px;
      text-align: center;
      box-shadow: 0 12px 36px rgba(13,74,46,0.08);
    }
    .brand {
      font-size: 14px;
      font-weight: 700;
      color: #2D8A5E;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }
    .brand-sub {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #7aaa90;
      margin-top: 2px;
    }
    h1 {
      color: #0D4A2E;
      font-size: clamp(28px, 5vw, 50px);
      line-height: 1.15;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .sub {
      color: #4f5f57;
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn {
      display: inline-block;
      background: #0D5A34;
      color: #fff;
      text-decoration: none;
      padding: 16px 34px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      transition: background 0.2s ease;
      font-family: inherit;
    }
    .btn:hover { background: #146b3f; }
    .lang-switch {
      display: flex; gap: 6px; justify-content: center; margin-bottom: 32px;
    }
    .lang-btn {
      background: transparent;
      color: #2D8A5E;
      border: 1px solid rgba(45,138,94,0.4);
      padding: 4px 14px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .lang-btn.active { background: #0D5A34; color: #fff; border-color: #0D5A34; }
    .lang-btn:hover:not(.active) { border-color: #2D8A5E; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      🌿 KS 99 EXPORT
      <span class="brand-sub">a division of KS.99 Engineering &amp; Service Co., Ltd.</span>
    </div>

    <div class="lang-switch">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-th" onclick="setLang('th')">TH</button>
    </div>

    <h1 data-i18n="title">Thank you for your inquiry</h1>
    <p class="sub" data-i18n="sub">We have received your message and will contact you within 24 hours to prepare a quotation for your review.</p>
    <a class="btn" href="index.html" data-i18n="btn">← Back to Home</a>
  </div>

  <script>
    const t = {
      en: {
        title: 'Thank you for your inquiry',
        sub: 'We have received your message and will contact you within 24 hours to prepare a quotation for your review.',
        btn: '← Back to Home'
      },
      th: {
        title: 'ขอบคุณสำหรับการสอบถาม',
        sub: 'เราได้รับข้อความของคุณแล้ว และจะติดต่อกลับภายใน 24 ชั่วโมงเพื่อเตรียมใบเสนอราคาให้คุณตรวจสอบ',
        btn: '← กลับสู่หน้าหลัก'
      }
    };

    let currentLang = localStorage.getItem('ks99-lang') || 'en';

    function setLang(lang) {
      currentLang = lang;
      document.getElementById('htmlRoot').lang = lang === 'th' ? 'th' : 'en';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[lang][key] !== undefined) el.innerHTML = t[lang][key];
      });
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-th').classList.toggle('active', lang === 'th');
      localStorage.setItem('ks99-lang', lang);
    }

    setLang(currentLang);
  </script>
</body>
</html>
